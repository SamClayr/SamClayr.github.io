<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css">
    <link rel="icon" href="https://raw.githubusercontent.com/SamClayr/SamClayr.github.io/refs/heads/master/image/favicon.ico" type="image/x-icon">


    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column; 
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f48fb1); 
            color: white;
        }
        .image-above {
            margin-bottom: 20px; 
        }
        .error-container {
            text-align: center;
            margin-bottom: 20px; 
        }
        .error-container h1 {
            font-size: 10rem;
            font-weight: bold;
            color: #ff6b6b;
            font-family: 'Fredoka One', cursive; 
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.2); 
        }
        .error-container p {
            font-size: 1.5rem;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3); 
            font-family: 'Arial', sans-serif; 
        }
        .btn-back {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            color: #fff;
            background-color: #77bde0; 
            border: 2px solid #5ca8d6; 
            border-radius: 25px;
            text-decoration: none;
            transition: all 0.3s ease;
            text-shadow: none; 
        }
        .btn-back:hover {
            background-color: #5ca8d6; 
            border-color: #4b97c2;
            color: #fff;
        }
        .image-container img,
        .image-above img {
            max-width: 100%; 
            height: auto;
            max-height: 300px; 
        }
    </style>
</head>
<body>
    <div class="image-above">
        <img src="https://i.ibb.co/4sHszgT/404design.png" alt="Above Illustration">
    </div>
    <div class="error-container">
        <h1>404</h1>
        <p>Oops! The page you're looking for doesn't exist.</p>
    </div>
    <div class="image-container">
        <img src="https://i.ibb.co/R0yfpzM/404lost.png" alt="Below Illustration">
    </div>
    <a href="index.html" class="btn-back">Go Back Home</a>
</body>
</html>
