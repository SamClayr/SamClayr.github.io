<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
   
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css">
    <link rel="icon" href="image/favicon.ico" type="image/x-icon">
    
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column; /* Stack items vertically */
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f48fb1); /* Pastel gradient colors */
            color: white;
        }
        .image-above {
            margin-bottom: 20px; /* Space below the top image */
        }
        .error-container {
            text-align: center;
            margin-bottom: 20px; /* Add spacing below the error text */
        }
        .error-container h1 {
            font-size: 10rem;
            font-weight: bold;
            color: #ff6b6b;
            font-family: 'Fredoka One', cursive; /* Apply playful font */
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.2); /* Stronger shadow for emphasis */
        }
        .error-container p {
            font-size: 1.5rem;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3); /* Slight shadow for readability */
            font-family: 'Arial', sans-serif; /* Keep it clean and simple for the paragraph */
        }
        .btn-back {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            color: #fff;
            background-color: #77bde0; /* Darker pastel blue */
            border: 2px solid #5ca8d6; /* Slightly darker blue for border */
            border-radius: 25px;
            text-decoration: none;
            transition: all 0.3s ease;
            text-shadow: none; /* Keep button text clean */
        }
        .btn-back:hover {
            background-color: #5ca8d6; /* Darker blue on hover */
            border-color: #4b97c2;
            color: #fff;
        }
        .image-container img,
        .image-above img {
            max-width: 100%; /* Ensure the image is responsive */
            height: auto;
            max-height: 300px; /* Optional: Limit the height of the image */
        }
    </style>
</head>
<body>
    <div class="image-above">
        <img src="./image/404design.png" alt="Above Illustration">
    </div>
    <div class="error-container">
        <h1>404</h1>
        <p>Oops! The page you're looking for doesn't exist.</p>
    </div>
    <div class="image-container">
        <img src="./image/404lost.png" alt="Below Illustration">
    </div>
    <a href="index.html" class="btn-back">Go Back Home</a>
</body>
</html>
